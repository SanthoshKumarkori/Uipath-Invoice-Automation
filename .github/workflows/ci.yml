name: UiPath RPA CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate UiPath Project
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Validate project.json exists
        run: |
          if (Test-Path "project.json") {
            Write-Host "✅ project.json found"
          } else {
            Write-Error "❌ project.json missing!"
            exit 1
          }
        shell: pwsh

      - name: Validate Config file exists
        run: |
          if (Test-Path "Config/Config.csv") {
            Write-Host "✅ Config.csv found"
          } else {
            Write-Error "❌ Config.csv missing!"
            exit 1
          }
        shell: pwsh

      - name: Validate Main workflow exists
        run: |
          if (Test-Path "Workflows/Main.xaml") {
            Write-Host "✅ Main.xaml found"
          } else {
            Write-Error "❌ Main.xaml missing!"
            exit 1
          }
        shell: pwsh

      - name: Validate project.json structure
        run: |
          $project = Get-Content "project.json" | ConvertFrom-Json
          Write-Host "✅ Project Name: $($project.name)"
          Write-Host "✅ Version: $($project.version)"
          Write-Host "✅ Main: $($project.main)"
          if (-not $project.dependencies) {
            Write-Error "❌ No dependencies defined!"
            exit 1
          }
          Write-Host "✅ Dependencies found: $($project.dependencies.PSObject.Properties.Count)"
        shell: pwsh

      - name: Check all XAML files are valid XML
        run: |
          $xamlFiles = Get-ChildItem -Recurse -Filter "*.xaml"
          Write-Host "Found $($xamlFiles.Count) XAML files"
          foreach ($file in $xamlFiles) {
            try {
              [xml](Get-Content $file.FullName)
              Write-Host "✅ Valid XML: $($file.Name)"
            } catch {
              Write-Error "❌ Invalid XML in: $($file.Name)"
              exit 1
            }
          }
        shell: pwsh

      - name: Validate no hardcoded credentials
        run: |
          $sensitivePatterns = @("password=", "pwd=", "apikey=", "secret=", "token=")
          $files = Get-ChildItem -Recurse -Include "*.xaml","*.json","*.csv"
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $sensitivePatterns) {
              if ($content -match $pattern) {
                Write-Error "❌ Possible hardcoded credential in: $($file.Name)"
                exit 1
              }
            }
          }
          Write-Host "✅ No hardcoded credentials found"
        shell: pwsh

      - name: Summary
        run: |
          Write-Host ""
          Write-Host "════════════════════════════════════"
          Write-Host "  ✅ All validations passed!"
          Write-Host "  Project: UiPath Invoice Automation"
          Write-Host "  Ready for deployment to Orchestrator"
          Write-Host "════════════════════════════════════"
        shell: pwsh
